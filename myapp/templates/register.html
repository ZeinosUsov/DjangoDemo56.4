{% extends 'base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="card">
    <h2>Регистрация в GosdumaMusic</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Логин</label>
            {{ form.username }}
        </div>
        <div class="form-group">
            <label>Email</label>
            {{ form.email }}
        </div>
        <div class="form-group">
            <label>ФИО (кириллица)</label>
            {{ form.fio }}
        </div>
        <div class="form-group">
            <label>Телефон (8(XXX)XXX-XX-XX)</label>
            {{ form.phone }}
        </div>
        <div class="form-group">
            <label>Пароль</label>
            {{ form.password1 }}
        </div>
        <div class="form-group">
            <label>Подтверждение пароля</label>
            {{ form.password2 }}
        </div>
        <button type="submit" class="btn">Зарегистрироваться</button>
    </form>
    <p style="margin-top: 20px; text-align: center;">
        Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
    </p>
</div>
{% endblock %}
